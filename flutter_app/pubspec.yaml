name: qr_system
description: "Aplicación Flutter para Sistema de Gestión de Objetos con QR."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:

  screenshot: ^3.0.0
  share_plus: ^7.2.1
  flutter:
    sdk: flutter
  qr_flutter: ^4.1.0

  # HTTP y networking
  http: ^1.1.0
  
  # State management
  provider: ^6.0.0
  
  # Local storage
  shared_preferences: ^2.2.0
  
  # QR Code scanning
  mobile_scanner: ^4.0.0
  
  # Date/time
  intl: ^0.19.0
  
  # JSON serialization
  json_serializable: ^6.7.0
  build_runner: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

path_provider: ^2.1.1
